; NET.CFG - Sample Configuration for DCEMLID Driver
;
; Place this file in the same directory as LSL.COM (typically C:\NWCLIENT)
; LSL reads this file during initialization and provides configuration
; to the DCEMLID driver.
;
; Configuration Format:
;   - Lines starting with ; are comments
;   - Keywords are case-insensitive
;   - Values depend on the keyword (see examples below)

; ============================================================================
; Example 1: Basic Serial Connection (COM1, 115200 baud)
; ============================================================================
Link Driver DCEMLID
   PORT 3F8
   INT 4
   MODE SERIAL
   BAUD 115200
   FLOW RTS
   NODE ADDRESS 02608C123456
   FRAME Ethernet_802.2

; ============================================================================
; Example 2: Serial Connection on COM2 with software flow control
; ============================================================================
;Link Driver DCEMLID
;   PORT 2F8
;   INT 3
;   MODE SERIAL
;   BAUD 57600
;   FLOW XON
;   NODE ADDRESS 02608C234567

; ============================================================================
; Example 3: Parallel Connection (LPT1, 4-bit mode)
; ============================================================================
;Link Driver DCEMLID
;   PORT 378
;   INT 7
;   MODE PAR4
;   NODE ADDRESS 02608C345678

; ============================================================================
; Example 4: Parallel Connection (LPT1, 8-bit EPP mode)
; ============================================================================
;Link Driver DCEMLID
;   PORT 378
;   INT 7
;   MODE PAR8
;   NODE ADDRESS 02608C456789

; ============================================================================
; Example 5: Multiple Instances (Two Serial Ports)
; ============================================================================
; First instance on COM1
;Link Driver DCEMLID 0
;   PORT 3F8
;   INT 4
;   MODE SERIAL
;   BAUD 115200
;   FLOW RTS
;   NODE ADDRESS 02608C111111
;
; Second instance on COM2
;Link Driver DCEMLID 1
;   PORT 2F8
;   INT 3
;   MODE SERIAL
;   BAUD 115200
;   FLOW RTS
;   NODE ADDRESS 02608C222222

; ============================================================================
; Configuration Keywords Reference
; ============================================================================
;
; PORT address
;    I/O port address in hex (no 0x prefix)
;    Serial: 3F8 (COM1), 2F8 (COM2), 3E8 (COM3), 2E8 (COM4)
;    Parallel: 378 (LPT1), 278 (LPT2), 3BC (LPT3)
;
; INT irq_number
;    IRQ number in decimal
;    Serial COM1/COM3: 4, Serial COM2/COM4: 3
;    Parallel LPT1: 7
;    If omitted, auto-detected from port address
;
; MODE type
;    Connection mode: SERIAL, PAR4, PAR8
;    Default: SERIAL
;
; BAUD rate
;    Serial baud rate in decimal (serial mode only)
;    Valid: 9600, 19200, 38400, 57600, 115200
;    Default: 115200
;
; FLOW type
;    Flow control for serial mode: RTS, XON
;    RTS = Hardware (RTS/CTS)
;    XON = Software (XON/XOFF)
;    Default: RTS
;
; NODE ADDRESS mac_address
;    12 hex digits (no separators), locally administered unicast address
;    Example: NODE ADDRESS 02608C123456
;    If omitted, random MAC is generated
;    IMPORTANT: Each computer must have a unique MAC address!
;
; ============================================================================
; Notes
; ============================================================================
;
; 1. Only uncomment ONE "Link Driver DCEMLID" section at a time
;    (unless using multiple instances with board numbers)
;
; 2. Both computers must use matching MODE, BAUD, and FLOW settings
;
; 3. Each computer must have a UNIQUE NODE ADDRESS
;
; 4. For hardware flow control (FLOW RTS), use proper null-modem cable
;    with RTS/CTS lines connected
;
; 5. For 8250 UART, use BAUD 38400 or lower to avoid packet loss
;
; 6. Board numbers (0-9) allow loading multiple driver instances:
;    - DCEMLID 0 loads "Link Driver DCEMLID 0"
;    - DCEMLID 1 loads "Link Driver DCEMLID 1"
;    - DCEMLID (no number) loads "Link Driver DCEMLID"
;
; 7. To use: LSL, then DCEMLID, then IPXODI
;
; ============================================================================
